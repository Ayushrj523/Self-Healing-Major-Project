<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamScale - Who's watching?</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body class="profile-gate-body">
    <div class="netflix-logo-container">
        <h1 class="netflix-logo">STREAMSCALE</h1>
    </div>
    <div class="profile-gate-container">
        <h1 class="profile-gate-title">Who's watching?</h1>
        <div class="profiles-wrapper">
            <a href="/browse" class="profile">
                <div class="profile-avatar" style="background-color: #e50914;"></div>
                <div class="profile-name">Dad</div>
            </a>
            <a href="/browse" class="profile">
                <div class="profile-avatar" style="background-color: #0071eb;"></div>
                <div class="profile-name">Mom</div>
            </a>
            <a href="/browse" class="profile">
                <div class="profile-avatar" style="background-color: #00b020;"></div>
                <div class="profile-name">Kids</div>
            </a>
            <a href="/browse" class="profile">
                <div class="profile-avatar" style="background-color: #eebf00;"></div>
                <div class="profile-name">Guest</div>
            </a>
        </div>
        <button class="manage-profiles-btn">Manage Profiles</button>
    </div>
</body>

</html>
