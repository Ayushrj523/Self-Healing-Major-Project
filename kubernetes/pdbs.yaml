# ═══════════════════════════════════════════════════════════════
# Pod Disruption Budgets — Ensures minimum availability during chaos
# ═══════════════════════════════════════════════════════════════

# Netflix Gateway — always keep at least 1 running
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: netflix
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
# Netflix User Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: netflix
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-service
---
# Netflix Content Service
apiVersion: policy/v1
