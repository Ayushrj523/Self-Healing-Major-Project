# ═══════════════════════════════════════════════════════════════
# Netflix Microservices — K8s Deployments + Services
# Namespace: netflix
# ═══════════════════════════════════════════════════════════════

# ──── User Service ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: netflix
  labels:
    app: user-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: user-service
        image: sentinels/netflix-user-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: netflix-db-secret
              key: database-url
        - name: REDIS_URL
          value: "redis://redis.monitoring.svc.cluster.local:6379/0"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: netflix-jwt-secret
              key: jwt-secret
        resources:
          requests: { cpu: "50m", memory: "128Mi" }
          limits: { cpu: "200m", memory: "256Mi" }
        readinessProbe:
          httpGet: { path: /health, port: 8002 }
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /health, port: 8002 }
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: netflix
spec:
  selector:
    app: user-service
  ports:
  - port: 8002
    targetPort: 8002
---
