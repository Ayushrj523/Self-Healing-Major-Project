# ──── API Gateway ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: netflix
  labels:
    app: api-gateway
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
      - name: api-gateway
        image: sentinels/netflix-api-gateway:latest
        ports:
        - containerPort: 8001
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: netflix-jwt-secret
              key: jwt-secret
        - name: USER_SERVICE_URL
          value: "http://user-service.netflix.svc.cluster.local:8002"
        - name: CONTENT_SERVICE_URL
          value: "http://content-service.netflix.svc.cluster.local:8003"
        - name: STREAMING_SERVICE_URL
          value: "http://streaming-service.netflix.svc.cluster.local:8004"
        - name: SEARCH_SERVICE_URL
          value: "http://search-service.netflix.svc.cluster.local:8005"
        - name: RECOMMENDATION_SERVICE_URL
          value: "http://recommendation-service.netflix.svc.cluster.local:8006"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service.netflix.svc.cluster.local:8007"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service.netflix.svc.cluster.local:8008"
        resources:
          requests: { cpu: "50m", memory: "128Mi" }
          limits: { cpu: "200m", memory: "256Mi" }
        readinessProbe:
          httpGet: { path: /health, port: 8001 }
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: netflix
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 8001
    targetPort: 8001
    nodePort: 30001
---
# ──── Netflix Frontend ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-frontend
  namespace: netflix
  labels:
    app: netflix-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix-frontend
  template:
    metadata:
      labels:
        app: netflix-frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: sentinels/netflix-frontend:latest
        ports:
        - containerPort: 3001
        resources:
          requests: { cpu: "30m", memory: "64Mi" }
          limits: { cpu: "100m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: netflix-frontend
  namespace: netflix
spec:
  type: NodePort
  selector:
    app: netflix-frontend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30000
