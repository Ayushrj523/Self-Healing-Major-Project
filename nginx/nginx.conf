events {
    worker_connections 1024;
}

http {
    # Define the pool of backend servers
    upstream sentinels_backend {
        server patient:5000;        # Primary — patient_netflix
        # Replicas are added/removed here dynamically by the healer
    }

    server {
        listen 80;

        location / {
            proxy_pass http://sentinels_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;

            # If primary fails, try next server in upstream
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        location /health {
            return 200 'Nginx OK';
            add_header Content-Type text/plain;
        }
    }
}